name: Android Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable


      - name: Clean Flutter
        run: flutter clean
      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug
